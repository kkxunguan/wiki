<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="html.title"></title>
  <link rel="stylesheet" href="./wangeditor/style.css" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body>
  <div class="app">
    <aside class="panel sidebar">
      <div class="sidebar-top">
        <h2 data-i18n="sidebar.treeTitle"></h2>
        <div id="latestVersion" class="latest-version"></div>
        <div class="row">
          <button id="quickCreatePageBtn" class="btn-primary grow" data-i18n="sidebar.quickCreate"></button>
        </div>
        <div class="row">
          <button id="importJsonBtn" class="grow" data-i18n="sidebar.importJson"></button>
          <button id="exportJsonBtn" class="grow" data-i18n="sidebar.exportJson"></button>
        </div>
        <div class="section-title" data-i18n="sidebar.operationTips"></div>
        <div class="sidebar-hint" data-i18n="sidebar.operationTipsHint"></div>
        <div class="tree-mode-bar">
          <button id="showPagesBtn" class="mode-tab active" type="button" data-i18n="tree.pages"></button>
          <button id="showTrashBtn" class="mode-tab" type="button" data-i18n="tree.trash"></button>
        </div>
      </div>
      <div class="sidebar-search">
        <div class="section-title" data-i18n="search.title"></div>
        <div class="search-input-row">
          <input id="globalSearchInput" type="text" data-i18n-placeholder="search.placeholder" />
          <button id="clearSearchBtn" type="button" data-i18n="search.clear"></button>
        </div>
        <div id="globalSearchResultMeta" class="search-meta hidden"></div>
      </div>
      <div id="globalSearchResults" class="search-results hidden"></div>
      <div id="pageList" class="page-list"></div>
      <div id="trashList" class="page-list hidden"></div>
    </aside>

    <section class="panel main">
      <div class="mode-switch-bar">
        <span id="pagePath" class="page-path"></span>
        <label class="locale-switch" for="localeSelect">
          <span data-i18n="locale.label"></span>
          <select id="localeSelect">
            <option value="zh-CN" data-i18n="locale.zhCN"></option>
            <option value="en-US" data-i18n="locale.enUS"></option>
          </select>
        </label>
        <button id="modeToggleBtn" type="button" data-i18n="mode.read"></button>
      </div>
      <div id="editorToolbarHost" class="toolbar">
        <div id="editorToolbar" class="wang-toolbar"></div>
      </div>

      <div class="workspace">
        <div id="editorWrap" class="editor-wrap">
          <div id="editor" class="editor wang-editor"></div>
          <div class="meta">
            <span id="counter" data-i18n="counter.initial"></span>
            <span data-i18n="editor.pasteHint"></span>
            <span id="status" class="status inline-status"></span>
          </div>
        </div>
      </div>
    </section>
  </div>

  <div id="pageItemMenu" class="context-menu">
    <button id="pageMenuOpenBtn" type="button" data-i18n="menu.page.open"></button>
    <button id="pageMenuNewChildBtn" type="button" data-i18n="menu.page.newChild"></button>
    <button id="pageMenuRenameBtn" type="button" data-i18n="menu.page.rename"></button>
    <button id="pageMenuSortUpBtn" type="button" data-i18n="menu.page.sortUp"></button>
    <button id="pageMenuSortDownBtn" type="button" data-i18n="menu.page.sortDown"></button>
    <button id="pageMenuSetSortBtn" type="button" data-i18n="menu.page.setSort"></button>
    <button id="pageMenuMoveRootBtn" type="button" data-i18n="menu.page.moveRoot"></button>
    <button id="pageMenuDeleteBtn" type="button" data-i18n="menu.page.delete"></button>
    <button id="pageMenuDeleteKeepChildrenBtn" type="button" data-i18n="menu.page.deleteKeepChildren"></button>
  </div>

  <div id="trashItemMenu" class="context-menu">
    <button id="trashMenuRestoreBtn" type="button" data-i18n="menu.trash.restore"></button>
    <button id="trashMenuDeleteBtn" type="button" data-i18n="menu.trash.delete"></button>
  </div>
  <div id="importModeMenu" class="context-menu">
    <button id="importMergeBtn" type="button" data-i18n="menu.import.merge"></button>
    <button id="importReplaceBtn" type="button" data-i18n="menu.import.replace"></button>
  </div>

  <input id="importJsonInput" type="file" accept="application/json,.json" style="display:none;" />

  <script src="./wangeditor/index.js"></script>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
