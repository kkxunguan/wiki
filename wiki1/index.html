<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="lib/wangeditor/style.css">
  <style>
    #editor—wrapper {
      border: 1px solid #ccc;
      z-index: 100;
      /* 按需定义 */
    }

    #toolbar-container {
      border-bottom: 1px solid #ccc;
    }

    #editor-container {
      height: 500px;
    }


    body,
    button,
    input,
    select,
    option,
    textarea {
      font-size: 14px;
      color: #222;
      font-family: "Microsoft YaHei", sans-serif;
    }

    body {
      margin: 0;
      padding: 16px;
      background: #f5f6f8;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    aside {
      width: 280px;
      min-height: 560px;
      background: #fff;
      border: 1px solid #ddd;
      padding: 12px;
    }

    section {
      flex: 1;
      background: #fff;
      border: 1px solid #ddd;
      padding: 12px;
    }

    p {
      margin: 0 0 12px;
    }

    input[type="text"] {
      height: 32px;
      padding: 0 8px;
      border: 1px solid #ccc;
      vertical-align: middle;
    }

    #pageName1 {
      width: 185px;
      margin-right: 8px;
    }

    #pageName2,
    #parent {
      width: 220px;
      margin-right: 10px;
    }

    button {
      height: 32px;
      padding: 0 12px;
      border: 1px solid #2d6cdf;
      background: #2d6cdf;
      color: #fff;
      cursor: pointer;
      vertical-align: middle;
    }

    #savePage {
      margin-top: 12px;
    }


    ul {
      list-style: none;
      margin: 0;
      padding-left: 18px;
    }

    #tree {
      padding-left: 0;
    }

    .node {
      cursor: pointer;
      user-select: none;
      padding: 3px 6px;
    }

    .arrow {
      display: inline-block;
      width: 16px;
      text-align: center;
      cursor: pointer;
    }

    .children {
      display: none;
    }

    .selected {
      background: #dbe9ff;
    }
  </style>
</head>

<body>
  <aside>
    <p>

      <input type="text" placeholder="新建页面标题" id="pageName1"><button id="createPage">创建</button>
    </p>

    <ul id="tree"></ul>
  </aside>

  <section>

    <p>页面标题：<input type="text" id="pageName2">父节点：<input type="text" id="parent"></p>
    <div id="editor—wrapper">
      <div id="toolbar-container"><!-- 工具栏 --></div>
      <div id="editor-container"><!-- 编辑器 --></div>
    </div>

    <button id="savePage">保存</button>
  </section>






  <script src="lib/wangeditor/index.js"></script>
  <script>


    const { createEditor, createToolbar } = window.wangEditor

    const editorConfig = {
      placeholder: 'Type here...',
      MENU_CONF: {
        uploadImage: {
          fieldName: 'your-fileName',
          base64LimitSize: 10 * 1024 * 1024 // 10M 以下插入 base64
        }
      },
      onChange(editor) {
        const html = editor.getHtml()
        console.log('editor content', html)
        // 也可以同步到 <textarea>
      },
    }

    const editor = createEditor({
      selector: '#editor-container',
      html: '<p><br></p>',
      config: editorConfig,
      mode: 'default', // or 'simple'
    })

    const toolbarConfig = {}

    const toolbar = createToolbar({
      editor,
      selector: '#toolbar-container',
      config: toolbarConfig,
      mode: 'default', // or 'simple'
    })



    // tree
    const data = [
      {
        name: "文档",
        content: "<p>1<br></p>",
        children: [
          {
            name: "JS",
            content: "<p>2<br></p>",
            children: [
              { name: "变量", content: "<p>3<br></p>" },
              { name: "函数", content: "<p>函数<br></p>" }
            ]
          },
          { name: "CSS", content: "<p><br></p>" }
        ]
      },
      {
        name: "文档",
        content: "<p>图片<br></p>",
        children: [
          { name: "logo.png", content: "<p>logo<br></p>" },
          { name: "banner.jpg", content: "<p><br>logo2</p>" }
        ]
      }
    ]

    let selectedNode = null

    function renderTree(nodes, container) {

      nodes.forEach((node, index) => {

        const li = document.createElement("li")

        const arrow = document.createElement("span")
        arrow.className = "arrow"

        const title = document.createElement("span")
        title.className = "node"
        title.textContent = node.name

        console.log(index) // 当前节点在本层的下标

        // ⭐ 保存 node 数据
        title._node = node

        li.appendChild(arrow)
        li.appendChild(title)

        container.appendChild(li)

        // 点击选择节点
        title.onclick = (e) => {

          e.stopPropagation()

          if (selectedNode) {
            selectedNode.classList.remove("selected")
          }

          title.classList.add("selected")
          selectedNode = title

          // ⭐ 读取 content
          const nodeData = title._node

          editor.setHtml(nodeData.content)

          document.getElementById("parent").value = nodeData.name
        }

        if (node.children && node.children.length) {

          arrow.textContent = "▶"

          const ul = document.createElement("ul")
          ul.className = "children"

          li.appendChild(ul)

          renderTree(node.children, ul)

          arrow.onclick = (e) => {

            e.stopPropagation()

            const isOpen = ul.style.display === "block"

            ul.style.display = isOpen ? "none" : "block"
            arrow.textContent = isOpen ? "▶" : "▼"
          }

        }

      })

    }

    renderTree(data, document.getElementById("tree"))

    document.getElementById("createPage").onclick = (e) => {
      let pageName1 = document.getElementById("pageName1").value
      document.getElementById("pageName2").value = pageName1
      document.getElementById("parent").value = "父节点"
    }

    document.getElementById("savePage").onclick = (e) => {
      const html = editor.getHtml()
      const pageName = document.getElementById("pageName2").value
      console.log(html, pageName)
    }
  </script>
</body>

</html>
